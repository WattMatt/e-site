name: Deploy DB Migrations

# Applies Supabase migrations to production via supabase db push.
# Triggers:
#   • workflow_dispatch — manual run from the Actions UI or gh workflow run.
#   • push to main touching a migration file — auto-applies new migrations.
# Requires repo secrets SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF and
# SUPABASE_DB_PASSWORD (bound 2026-06-02). The path filter stops the auto-run
# from firing on pushes that don't change a migration.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/edge-functions/supabase/migrations/**'

jobs:
  migrate:
    name: Push migrations to Supabase
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run migrations
        working-directory: apps/edge-functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref $SUPABASE_PROJECT_REF
          supabase db push
