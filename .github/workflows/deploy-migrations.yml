name: Deploy DB Migrations

# Manual-only — auto-trigger on push removed because the GitHub Actions
# secrets (SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, SUPABASE_DB_PASSWORD)
# aren't bound, so every main push generated a noise email. Re-enable the
# push trigger once those secrets are set in Settings → Secrets and
# Variables → Actions.
on:
  workflow_dispatch:

jobs:
  migrate:
    name: Push migrations to Supabase
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run migrations
        working-directory: apps/edge-functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref $SUPABASE_PROJECT_REF
          supabase db push
