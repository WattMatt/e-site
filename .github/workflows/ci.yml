name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PNPM_VERSION: '10.33.0'

jobs:
  # -----------------------------------------------------------------------
  # Lint + type-check (fast gate, no DB needed)
  # -----------------------------------------------------------------------
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

  # -----------------------------------------------------------------------
  # Unit tests (Vitest — shared + web)
  # -----------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:ci

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # -----------------------------------------------------------------------
  # Build (ensures all apps compile)
  # -----------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

  # -----------------------------------------------------------------------
  # DB migration validation (checks files exist + SQL is non-empty)
  # Full lint against live DB runs in deploy-migrations workflow
  # -----------------------------------------------------------------------
  db-migrations:
    name: Validate DB Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate migration files exist
        run: |
          MIGRATION_DIR="supabase/migrations"
          if [ ! -d "$MIGRATION_DIR" ]; then
            echo "ERROR: $MIGRATION_DIR directory not found"
            exit 1
          fi
          COUNT=$(find "$MIGRATION_DIR" -name "*.sql" | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "ERROR: No .sql migration files found in $MIGRATION_DIR"
            exit 1
          fi
          echo "Found $COUNT migration file(s) in $MIGRATION_DIR"
          # Check none are empty
          find "$MIGRATION_DIR" -name "*.sql" -empty -exec echo "ERROR: Empty migration file: {}" \; -exec exit 1 \;
          echo "All migration files are non-empty. OK."
