# Supabase local dev config
# See: https://supabase.com/docs/reference/cli/config

[api]
enabled = true
port = 54321
# NOTE: 'compliance' was dropped by migration 00066 (replaced by 'inspections') —
# listing it here makes PostgREST fail its schema cache on a fresh local DB.
schemas = ["public", "projects", "field", "tenants", "suppliers", "billing", "marketplace", "gcr", "structure", "cable_schedule", "inspections"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "exp://localhost:8081",
  "http://localhost:3000/accept-invite",
  "http://localhost:3000/reset-password/confirm",
  "http://localhost:3000/auth/callback",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Send Email auth hook — routes ALL auth emails (signup, recovery, invite,
# magiclink, email_change) through the auth-email-hook edge function, which
# renders the branded template and sends via Resend. The secret is read from
# the env var SEND_EMAIL_HOOK_SECRET (set in .env for local; Supabase dashboard
# in prod — see the deploy checklist). PRODUCTION uses HOSTED Supabase, so this
# block governs LOCAL behaviour only; prod is configured in the dashboard.
[auth.hook.send_email]
enabled = true
uri = "http://host.docker.internal:54321/functions/v1/auth-email-hook"
secrets = "env(SEND_EMAIL_HOOK_SECRET)"

# The Send Email hook calls this function with a standardwebhooks-signed request
# (header `webhook-signature`), NOT a Supabase user JWT. JWT verification must be
# OFF or the gateway 401s every hook call before our signature check runs. The
# function authenticates itself by verifying SEND_EMAIL_HOOK_SECRET.
[functions.auth-email-hook]
verify_jwt = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = false
