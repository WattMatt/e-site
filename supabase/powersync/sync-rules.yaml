# supabase/powersync/sync-rules.yaml
#
# Deploy via: PowerSync Dashboard > Sync Rules > paste contents
# Each bucket is partitioned by org_id from the JWT token_parameters.
# This mirrors the Supabase RLS policies — each user only syncs their org's data.

bucket_definitions:
  org_projects:
    parameters:
      - name: org_id
        token_parameter: org_id
    data:
      - SELECT id, name, status, city, province, organisation_id
        FROM projects
        WHERE organisation_id = bucket.org_id

  org_snags:
    parameters:
      - name: org_id
        token_parameter: org_id
    data:
      - SELECT id, title, description, status, priority,
               project_id, organisation_id, assigned_to,
               raised_by, created_at
        FROM snags
        WHERE organisation_id = bucket.org_id

  org_snag_photos:
    parameters:
      - name: org_id
        token_parameter: org_id
    data:
      - SELECT sp.id, sp.snag_id, sp.file_path, sp.caption, sp.photo_type, sp.uploaded_by, sp.created_at
        FROM field.snag_photos sp
        JOIN snags s ON s.id = sp.snag_id
        WHERE s.organisation_id = bucket.org_id

  # tenants.floor_plans — mirrored offline so field workers can open the
  # markup canvas + RFI annotator without connectivity. Cloud-synced rows
  # have source_provider populated; locally-uploaded rows have it null.
  # Both shapes sync identically.
  org_floor_plans:
    parameters:
      - name: org_id
        token_parameter: org_id
    data:
      - SELECT id, project_id, organisation_id, name, level, file_path,
               file_size_bytes, width_px, height_px, scale, is_active,
               source_provider, source_file_id, source_revision_id,
               source_path, synced_at, uploaded_by, created_at, updated_at
        FROM tenants.floor_plans
        WHERE organisation_id = bucket.org_id

  # tenants.documents — generic project documents (specs, contracts,
  # handovers, photos). Mobile gets read-only access offline. Phase 1
  # has no mobile-side write path; that's a Phase 3+ feature.
  org_documents:
    parameters:
      - name: org_id
        token_parameter: org_id
    data:
      - SELECT id, project_id, organisation_id, name, category,
               storage_path, mime_type, size_bytes,
               source_provider, source_file_id, source_revision_id,
               source_path, synced_at, uploaded_by, created_at, updated_at
        FROM tenants.documents
        WHERE organisation_id = bucket.org_id

  # inspections.templates — active templates only; field workers need
  # the schema_json offline to render the capture form. Drafts + archived
  # versions stay server-side.
  org_inspection_templates:
    parameters:
      - name: org_id
        token_parameter: org_id
    data:
      - SELECT *
        FROM inspections.templates
        WHERE organisation_id = bucket.org_id
          AND is_active = true

  # inspections.inspections — every in-flight inspection (assigned, in_progress,
  # awaiting_verification, re-inspect_required). Certified + abandoned drop off
  # the device once they're terminal.
  org_inspections:
    parameters:
      - name: org_id
        token_parameter: org_id
    data:
      - SELECT *
        FROM inspections.inspections
        WHERE organisation_id = bucket.org_id
          AND status NOT IN ('certified','abandoned')

  # inspections.responses — captured field values for in-flight inspections.
  # Joined via inspection_id so the bucket scope mirrors org_inspections.
  org_inspection_responses:
    parameters:
      - name: org_id
        token_parameter: org_id
    data:
      - SELECT r.*
        FROM inspections.responses r
        JOIN inspections.inspections i ON i.id = r.inspection_id
        WHERE i.organisation_id = bucket.org_id
          AND i.status NOT IN ('certified','abandoned')

  # inspections.photos — metadata only (no binary). Files themselves live in
  # Supabase Storage bucket `inspection-photos` and are fetched on demand via
  # signed URL. Mobile-side captures go through the local attachment_uploads
  # queue and only land in this table once the upload worker has succeeded.
  org_inspection_photos_meta:
    parameters:
      - name: org_id
        token_parameter: org_id
    data:
      - SELECT p.id, p.inspection_id, p.section_id, p.field_id,
               p.storage_path, p.caption, p.taken_at, p.gps_lat, p.gps_lng,
               p.uploaded_by, p.created_at
        FROM inspections.photos p
        JOIN inspections.inspections i ON i.id = p.inspection_id
        WHERE i.organisation_id = bucket.org_id
          AND i.status NOT IN ('certified','abandoned')

  # project_access — cross-org shared sites. The user's `project_ids` JWT claim
  # (00157 hook) lists every project they reach via an ACTIVE explicit
  # project_members assignment whose identity org they're still active in —
  # the exact public.user_has_project_access clause (a) set. This bucket is
  # purely additive; own-org data continues to sync via the org_* buckets, and
  # rows dedupe by primary key across buckets.
  project_access:
    parameters: SELECT value AS project_id FROM json_each(request.jwt() -> 'project_ids')
    data:
      - SELECT id, name, status, city, province, organisation_id
        FROM projects
        WHERE id = bucket.project_id

      - SELECT id, title, description, status, priority,
               project_id, organisation_id, assigned_to,
               raised_by, created_at
        FROM snags
        WHERE project_id = bucket.project_id

      - SELECT sp.id, sp.snag_id, sp.file_path, sp.caption, sp.photo_type, sp.uploaded_by, sp.created_at
        FROM field.snag_photos sp
        JOIN snags s ON s.id = sp.snag_id
        WHERE s.project_id = bucket.project_id

      - SELECT id, project_id, organisation_id, name, level, file_path,
               file_size_bytes, width_px, height_px, scale, is_active,
               source_provider, source_file_id, source_revision_id,
               source_path, synced_at, uploaded_by, created_at, updated_at
        FROM tenants.floor_plans
        WHERE project_id = bucket.project_id

      - SELECT id, project_id, organisation_id, name, category,
               storage_path, mime_type, size_bytes,
               source_provider, source_file_id, source_revision_id,
               source_path, synced_at, uploaded_by, created_at, updated_at
        FROM tenants.documents
        WHERE project_id = bucket.project_id

      - SELECT *
        FROM inspections.inspections
        WHERE project_id = bucket.project_id
          AND status NOT IN ('certified','abandoned')

      - SELECT r.*
        FROM inspections.responses r
        JOIN inspections.inspections i ON i.id = r.inspection_id
        WHERE i.project_id = bucket.project_id
          AND i.status NOT IN ('certified','abandoned')

      - SELECT p.id, p.inspection_id, p.section_id, p.field_id,
               p.storage_path, p.caption, p.taken_at, p.gps_lat, p.gps_lng,
               p.uploaded_by, p.created_at
        FROM inspections.photos p
        JOIN inspections.inspections i ON i.id = p.inspection_id
        WHERE i.project_id = bucket.project_id
          AND i.status NOT IN ('certified','abandoned')
