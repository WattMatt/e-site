# supabase/powersync/sync-rules.yaml
#
# Deploy via: PowerSync Dashboard > Sync Rules > paste contents
# Each bucket is partitioned by org_id from the JWT token_parameters.
# This mirrors the Supabase RLS policies — each user only syncs their org's data.

bucket_definitions:
  org_projects:
    parameters:
      - name: org_id
        token_parameter: org_id
    data:
      - SELECT id, name, status, city, province, organisation_id
        FROM projects
        WHERE organisation_id = bucket.org_id

  org_snags:
    parameters:
      - name: org_id
        token_parameter: org_id
    data:
      - SELECT id, title, description, status, priority,
               project_id, organisation_id, assigned_to,
               raised_by, created_at
        FROM snags
        WHERE organisation_id = bucket.org_id

  org_snag_photos:
    parameters:
      - name: org_id
        token_parameter: org_id
    data:
      - SELECT sp.id, sp.snag_id, sp.file_path, sp.caption, sp.photo_type, sp.uploaded_by, sp.created_at
        FROM field.snag_photos sp
        JOIN snags s ON s.id = sp.snag_id
        WHERE s.organisation_id = bucket.org_id

  # tenants.floor_plans — mirrored offline so field workers can open the
  # markup canvas + RFI annotator without connectivity. Cloud-synced rows
  # have source_provider populated; locally-uploaded rows have it null.
  # Both shapes sync identically.
  org_floor_plans:
    parameters:
      - name: org_id
        token_parameter: org_id
    data:
      - SELECT id, project_id, organisation_id, name, level, file_path,
               file_size_bytes, width_px, height_px, scale, is_active,
               source_provider, source_file_id, source_revision_id,
               source_path, synced_at, uploaded_by, created_at, updated_at
        FROM tenants.floor_plans
        WHERE organisation_id = bucket.org_id

  # tenants.documents — generic project documents (specs, contracts,
  # handovers, photos). Mobile gets read-only access offline. Phase 1
  # has no mobile-side write path; that's a Phase 3+ feature.
  org_documents:
    parameters:
      - name: org_id
        token_parameter: org_id
    data:
      - SELECT id, project_id, organisation_id, name, category,
               storage_path, mime_type, size_bytes,
               source_provider, source_file_id, source_revision_id,
               source_path, synced_at, uploaded_by, created_at, updated_at
        FROM tenants.documents
        WHERE organisation_id = bucket.org_id
